<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexobox Store</title>
    <script src="https://js.pusher.com/8.2/pusher.min.js"></script>
    <!-- ALL YOUR EXISTING CSS HERE -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
        }

        /* Admin Modal Styles */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .admin-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 25px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .admin-container h2 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .admin-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 1.5rem;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .admin-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            animation: none;
        }

        .admin-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .close-admin {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 2rem;
            color: #666;
            cursor: pointer;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            width: 400px;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            z-index: 1500;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow-y: auto;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
        }

        .admin-header h3 {
            color: #333;
            font-size: 1.5rem;
        }

        .close-panel {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #666;
            cursor: pointer;
        }

        .product-form {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            background: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.4);
        }

        .products-list {
            margin-top: 2rem;
        }

        .product-item {
            background: rgba(255, 255, 255, 0.7);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }

        /* Admin Toggle Button */
        .admin-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
        }

        .admin-toggle:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 5%;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffd700;
            transform: translateY(-2px);
        }

        .cta-button {
            padding: 12px 30px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero-content {
            max-width: 800px;
            padding: 0 2rem;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .products {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            color: white;
            font-size: 3rem;
            margin-bottom: 4rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .product-card {
            padding: 2rem;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-20px) scale(1.02);
        }

        .product-image {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            backdrop-filter: blur(10px);
        }

        .product-card h3 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .product-card p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 1rem;
        }

        .buy-btn {
            padding: 15px 40px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #333;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .buy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
        }

        .features {
            padding: 100px 5%;
            background: rgba(0, 0, 0, 0.1);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 4rem auto 0;
        }

        .feature-card {
            padding: 2.5rem;
            text-align: center;
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
            border-radius: 20px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .feature-card h3 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        footer {
            padding: 3rem 5% 1rem;
            text-align: center;
            color: rgba(255,255,255,0.8);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .social-links {
            margin: 2rem 0;
        }

        .social-links a {
            color: white;
            font-size: 1.5rem;
            margin: 0 1rem;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: #ffd700;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .admin-panel {
                width: 95%;
                right: 2.5%;
                left: 2.5%;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shake {
            0%,100%{transform:translateX(0)}
            25%{transform:translateX(-5px)}
            75%{transform:translateX(5px)}
        }

        @keyframes slideIn {
            from{transform:translateX(100%);opacity:0}
            to{transform:translateX(0);opacity:1}
        }

        .product-card:nth-child(1) { animation: float 6s ease-in-out infinite; }
        .product-card:nth-child(2) { animation: float 6s ease-in-out infinite 1s; }
        .product-card:nth-child(3) { animation: float 6s ease-in-out infinite 2s; }</style>
</head>
<body>
    <!-- ALL YOUR EXISTING HTML HERE -->
    
    <script>
        // 🔥 SERVER + PUSHER VERSION
        const API_URL = 'https://your-vercel-app.vercel.app/api/products'; // ← Your Vercel URL
        const PUSHER_APP_KEY = 'YOUR_PUSHER_KEY'; // ← Public key only
        const PUSHER_CLUSTER = 'us2';
        const ADMIN_CODE = '123456'; // ← Same as server

        let pusher = null;
        let channel = null;
        let products = [];

        // 🌐 SERVER + LOCALSTORAGE
        async function loadProducts() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                products = data.products;
                localStorage.setItem('nexobox-products', JSON.stringify(products));
                console.log('🌐 Loaded from SERVER:', products.length);
            } catch (e) {
                // Fallback to localStorage
                const saved = localStorage.getItem('nexobox-products');
                if (saved) products = JSON.parse(saved);
                console.log('📦 Fallback to localStorage');
            }
            renderProducts();
            updateProductsList();
        }

        // 💾 SERVER SAVE
        async function saveToServer(products, type = 'update') {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        products, 
                        adminCode: ADMIN_CODE,
                        type 
                    })
                });
                const data = await res.json();
                console.log('✅ Server saved:', data);
                return data;
            } catch (e) {
                console.error('Server save failed:', e);
                // Still save locally
                localStorage.setItem('nexobox-products', JSON.stringify(products));
            }
        }

        // 🔥 PUSHER SETUP
        function initPusher() {
            pusher = new Pusher(PUSHER_APP_KEY, {
                cluster: PUSHER_CLUSTER,
                forceTLS: true
            });
            
            channel = pusher.subscribe('nexobox-admin');
            
            channel.bind('product-update', (data) => {
                products = data.products;
                localStorage.setItem('nexobox-products', JSON.stringify(products));
                renderProducts();
                updateProductsList();
                showNotification('🔥 LIVE UPDATE FROM SERVER!');
            });
            
            channel.bind('product-delete', (data) => {
                products = data.products;
                localStorage.setItem('nexobox-products', JSON.stringify(products));
                renderProducts();
                updateProductsList();
                showNotification('🗑️ LIVE DELETE FROM SERVER!');
            });
        }

        // ✅ FIXED SAVE (SERVER FIRST)
        async function saveProduct() {
            const icon = document.getElementById('productIcon').value || '📱';
            const title = document.getElementById('productTitle').value;
            const desc = document.getElementById('productDesc').value;
            const price = document.getElementById('productPrice').value;
            const position = parseInt(document.getElementById('productPosition').value);

            if (!title || !desc || !price) return alert('❌ Fill all fields!');

            products[position] = { icon, title, desc, price };
            
            // 🌐 SAVE TO SERVER (triggers Pusher)
            await saveToServer(products, 'update');
            
            renderProducts();
            updateProductsList();
            clearForm();
            showNotification('✅ SAVED TO SERVER + ALL DEVICES!');
        }

        // ✅ FIXED DELETE
        async function deleteProduct(index) {
            if (!confirm('🗑️ Delete?')) return;
            
            products.splice(index, 1);
            products.push({ icon: '➖', title: 'Empty Slot', desc: 'Add new product', price: '$0' });
            
            await saveToServer(products, 'delete');
            showNotification('🗑️ DELETED FROM SERVER!');
        }

        // All other functions same (renderProducts, etc.)

        // 🚀 INIT
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts(); // Server first!
            // ... rest same
        });
    </script>
</body>
</html>
